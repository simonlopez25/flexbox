<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Flexbox Gallery</title>
  </head>
  <body>
    <header>
      <h1>Responsive Image Gallery</h1>
    </header>
    <main>
      <section>
        <div class="image-container">
          <p>Savanna image</p>
          <img src="img/savanna.jpg" alt="Savanna landscape" />
        </div>

        <div class="image-container">
          <p>Savanna image</p>
          <img src="img/savanna1.png" alt="Savanna landscape alternate view" />
        </div>

        <div class="image-container">
          <p>Desert image</p>
          <img src="img/desert.png" alt="Desert landscape" />
        </div>

        <div class="image-container">
          <p>Jungle image</p>
          <img src="img/jungle.jpg" alt="Lush jungle scenery" />
        </div>

        <div class="image-container">
          <p>Rainforest image</p>
          <img src="img/rainforest.jpg" alt="Tropical rainforest view" />
        </div>

        <div class="image-container">
          <p>Underwater image</p>
          <img src="img/coral.png" alt="Underwater coral reef" />
        </div>

        <div class="image-container">
          <p>Insects image</p>
          <img src="img/insects.png" alt="Close-up of insects" />
        </div>

        <div class="image-container">
          <p>Moorland image</p>
          <img src="img/moorland.png" alt="Moorland landscape" />
        </div>
      </section>
    </main>
  </body>
</html>
